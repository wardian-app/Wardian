coverage:
  status:
    project:
      frontend:
        flags: [frontend]
        informational: true
      backend:
        flags: [backend]
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags"
  behavior: default
  require_changes: true

flags:
  frontend:
    paths:
      - src/
    carryforward: false
  backend:
    paths:
      - src-tauri/
      - crates/
    carryforward: false
