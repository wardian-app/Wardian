name: APT Repository

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable release tag to publish, for example v0.4.0"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build and validate APT repository
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Debian repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg ca-certificates curl

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must be a stable semver tag like v0.4.0" >&2
            exit 1
          fi

      - name: Fetch release asset metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apt-release"
          gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,assets > "$RUNNER_TEMP/apt-release/assets.json"
          node <<'NODE'
          const fs = require("fs");
          const path = `${process.env.RUNNER_TEMP}/apt-release/assets.json`;
          const release = JSON.parse(fs.readFileSync(path, "utf8"));
          if (release.isDraft) {
            throw new Error(`${release.tagName} is still a draft release`);
          }
          if (release.isPrerelease) {
            throw new Error(`${release.tagName} is a prerelease; APT stable only publishes stable releases`);
          }
          const version = release.tagName.replace(/^v/, "");
          const expected = `Wardian_${version}_amd64.deb`;
          const asset = release.assets.find((candidate) => candidate.name === expected);
          if (!asset) {
            throw new Error(`Missing required release asset ${expected}`);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `WARDIAN_DEB_NAME=${expected}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `WARDIAN_DEB_URL=${asset.url}\n`);
          NODE

      - name: Download Debian package
        run: |
          set -euo pipefail
          curl --fail --location --output "$RUNNER_TEMP/apt-release/$WARDIAN_DEB_NAME" "$WARDIAN_DEB_URL"

      - name: Prepare signing key
        run: |
          set -euo pipefail
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          gpg --batch --passphrase '' --quick-gen-key "Wardian APT Dry Run <apt-dry-run@wardian.local>" ed25519 sign 1d
          signing_key="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [[ -z "$signing_key" ]]; then
            echo "No secret signing key is available" >&2
            exit 1
          fi
          {
            echo "GNUPGHOME=$GNUPGHOME"
            echo "WARDIAN_APT_SIGNING_KEY=$signing_key"
          } >> "$GITHUB_ENV"

      - name: Prepare repository output
        id: prepare_repository
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist/packages/apt"
          echo "APT_REPO_OUT=$GITHUB_WORKSPACE/dist/packages/apt" >> "$GITHUB_ENV"
          echo "repo_out=$GITHUB_WORKSPACE/dist/packages" >> "$GITHUB_OUTPUT"

      - name: Generate APT repository
        run: |
          set -euo pipefail
          npm run release:apt-repo -- \
            --release-assets "$RUNNER_TEMP/apt-release/assets.json" \
            --deb "$RUNNER_TEMP/apt-release/$WARDIAN_DEB_NAME" \
            --out "$APT_REPO_OUT" \
            --signing-key "$WARDIAN_APT_SIGNING_KEY"

      - name: Verify repository signatures
        run: |
          set -euo pipefail
          test -s "$APT_REPO_OUT/dists/stable/main/binary-amd64/Packages"
          test -s "$APT_REPO_OUT/dists/stable/main/binary-amd64/Packages.gz"
          test -s "$APT_REPO_OUT/dists/stable/Release"
          test -s "$APT_REPO_OUT/dists/stable/InRelease"
          test -s "$APT_REPO_OUT/dists/stable/Release.gpg"
          test -s "$APT_REPO_OUT/wardian-archive-keyring.gpg"
          gpg --verify "$APT_REPO_OUT/dists/stable/Release.gpg" "$APT_REPO_OUT/dists/stable/Release"
          gpg --verify "$APT_REPO_OUT/dists/stable/InRelease"

      - name: Validate repository with APT
        run: |
          set -euo pipefail
          sudo install -d -m 0755 /etc/apt/keyrings
          sudo install -m 0644 "$APT_REPO_OUT/wardian-archive-keyring.gpg" /etc/apt/keyrings/wardian-test.gpg
          sudo tee /etc/apt/sources.list.d/wardian-test.sources >/dev/null <<EOF
          Types: deb
          URIs: file://$APT_REPO_OUT
          Suites: stable
          Components: main
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/wardian-test.gpg
          EOF
          sudo apt-get update
          apt-cache policy wardian
          apt-get download wardian

      - name: Upload APT repository artifact
        uses: actions/upload-artifact@v7
        with:
          name: wardian-apt-repository-${{ inputs.release_tag }}
          path: |
            ${{ steps.prepare_repository.outputs.repo_out }}
