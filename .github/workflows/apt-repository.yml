name: APT Repository

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable release tag to publish, for example v0.4.0"
        required: true
      publish:
        description: "Push the generated repository to the configured static host repository"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      release_tag:
        description: "Stable release tag to publish, for example v0.4.0"
        required: true
        type: string
      publish:
        description: "Push the generated repository to the configured static host repository"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build and validate APT repository
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      PUBLISH: ${{ inputs.publish }}
      APT_REPOSITORY_REPOSITORY: ${{ vars.APT_REPOSITORY_REPOSITORY }}
      APT_REPOSITORY_BRANCH: ${{ vars.APT_REPOSITORY_BRANCH }}
      APT_REPOSITORY_CNAME: ${{ vars.APT_REPOSITORY_CNAME }}
      APT_REPOSITORY_DEPLOY_TOKEN: ${{ secrets.APT_REPOSITORY_DEPLOY_TOKEN }}
      WARDIAN_APT_SIGNING_PRIVATE_KEY: ${{ secrets.WARDIAN_APT_SIGNING_PRIVATE_KEY }}
      WARDIAN_APT_SIGNING_KEY_PASSPHRASE: ${{ secrets.WARDIAN_APT_SIGNING_KEY_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Debian repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg ca-certificates curl

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must be a stable semver tag like v0.4.0" >&2
            exit 1
          fi

      - name: Resolve publish mode
        id: publish_mode
        run: |
          set -euo pipefail
          if [[ "$PUBLISH" != "true" ]]; then
            echo "effective_publish=false" >> "$GITHUB_OUTPUT"
            echo "APT_EFFECTIVE_PUBLISH=false" >> "$GITHUB_ENV"
            exit 0
          fi

          missing=()
          [[ -n "$APT_REPOSITORY_REPOSITORY" ]] || missing+=("APT_REPOSITORY_REPOSITORY")
          [[ -n "$APT_REPOSITORY_DEPLOY_TOKEN" ]] || missing+=("APT_REPOSITORY_DEPLOY_TOKEN")
          [[ -n "$WARDIAN_APT_SIGNING_PRIVATE_KEY" ]] || missing+=("WARDIAN_APT_SIGNING_PRIVATE_KEY")

          if (( ${#missing[@]} > 0 )); then
            echo "::notice::APT publishing requested, but missing ${missing[*]}; generating a signed dry-run artifact instead."
            echo "effective_publish=false" >> "$GITHUB_OUTPUT"
            echo "APT_EFFECTIVE_PUBLISH=false" >> "$GITHUB_ENV"
          else
            echo "effective_publish=true" >> "$GITHUB_OUTPUT"
            echo "APT_EFFECTIVE_PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Fetch release asset metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apt-release"
          gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,assets > "$RUNNER_TEMP/apt-release/assets.json"
          node <<'NODE'
          const fs = require("fs");
          const path = `${process.env.RUNNER_TEMP}/apt-release/assets.json`;
          const release = JSON.parse(fs.readFileSync(path, "utf8"));
          if (release.isDraft) {
            throw new Error(`${release.tagName} is still a draft release`);
          }
          if (release.isPrerelease) {
            throw new Error(`${release.tagName} is a prerelease; APT stable only publishes stable releases`);
          }
          const version = release.tagName.replace(/^v/, "");
          const expected = `Wardian_${version}_amd64.deb`;
          const asset = release.assets.find((candidate) => candidate.name === expected);
          if (!asset) {
            throw new Error(`Missing required release asset ${expected}`);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `WARDIAN_DEB_NAME=${expected}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `WARDIAN_DEB_URL=${asset.url}\n`);
          NODE

      - name: Download Debian package
        run: |
          set -euo pipefail
          curl --fail --location --output "$RUNNER_TEMP/apt-release/$WARDIAN_DEB_NAME" "$WARDIAN_DEB_URL"

      - name: Prepare signing key
        run: |
          set -euo pipefail
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          if [[ -n "$WARDIAN_APT_SIGNING_PRIVATE_KEY" ]]; then
            printf '%s' "$WARDIAN_APT_SIGNING_PRIVATE_KEY" | gpg --batch --import
          else
            echo "::notice::WARDIAN_APT_SIGNING_PRIVATE_KEY is not configured; using a temporary dry-run signing key."
            gpg --batch --passphrase '' --quick-gen-key "Wardian APT Dry Run <apt-dry-run@wardian.local>" ed25519 sign 1d
          fi
          signing_key="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [[ -z "$signing_key" ]]; then
            echo "No secret signing key is available" >&2
            exit 1
          fi
          {
            echo "GNUPGHOME=$GNUPGHOME"
            echo "WARDIAN_APT_SIGNING_KEY=$signing_key"
          } >> "$GITHUB_ENV"

      - name: Prepare repository output
        id: prepare_repository
        run: |
          set -euo pipefail
          if [[ "$APT_EFFECTIVE_PUBLISH" == "true" ]]; then
            branch="${APT_REPOSITORY_BRANCH:-main}"
            git clone --branch "$branch" "https://x-access-token:${APT_REPOSITORY_DEPLOY_TOKEN}@github.com/${APT_REPOSITORY_REPOSITORY}.git" "$RUNNER_TEMP/apt-repository"
            echo "APT_REPOSITORY_BRANCH=$branch" >> "$GITHUB_ENV"
            echo "APT_REPO_OUT=$RUNNER_TEMP/apt-repository" >> "$GITHUB_ENV"
            echo "repo_out=$RUNNER_TEMP/apt-repository" >> "$GITHUB_OUTPUT"
          else
            mkdir -p "$GITHUB_WORKSPACE/dist/apt"
            echo "APT_REPO_OUT=$GITHUB_WORKSPACE/dist/apt" >> "$GITHUB_ENV"
            echo "repo_out=$GITHUB_WORKSPACE/dist/apt" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate APT repository
        run: |
          set -euo pipefail
          npm run release:apt-repo -- \
            --release-assets "$RUNNER_TEMP/apt-release/assets.json" \
            --deb "$RUNNER_TEMP/apt-release/$WARDIAN_DEB_NAME" \
            --out "$APT_REPO_OUT" \
            --signing-key "$WARDIAN_APT_SIGNING_KEY"
          if [[ -n "${APT_REPOSITORY_CNAME:-}" ]]; then
            printf '%s\n' "$APT_REPOSITORY_CNAME" > "$APT_REPO_OUT/CNAME"
          fi

      - name: Verify repository signatures
        run: |
          set -euo pipefail
          test -s "$APT_REPO_OUT/dists/stable/main/binary-amd64/Packages"
          test -s "$APT_REPO_OUT/dists/stable/main/binary-amd64/Packages.gz"
          test -s "$APT_REPO_OUT/dists/stable/Release"
          test -s "$APT_REPO_OUT/dists/stable/InRelease"
          test -s "$APT_REPO_OUT/dists/stable/Release.gpg"
          test -s "$APT_REPO_OUT/wardian-archive-keyring.gpg"
          gpg --verify "$APT_REPO_OUT/dists/stable/Release.gpg" "$APT_REPO_OUT/dists/stable/Release"
          gpg --verify "$APT_REPO_OUT/dists/stable/InRelease"

      - name: Validate repository with APT
        run: |
          set -euo pipefail
          sudo install -d -m 0755 /etc/apt/keyrings
          sudo install -m 0644 "$APT_REPO_OUT/wardian-archive-keyring.gpg" /etc/apt/keyrings/wardian-test.gpg
          sudo tee /etc/apt/sources.list.d/wardian-test.sources >/dev/null <<EOF
          Types: deb
          URIs: file://$APT_REPO_OUT
          Suites: stable
          Components: main
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/wardian-test.gpg
          EOF
          sudo apt-get update
          apt-cache policy wardian
          apt-get download wardian

      - name: Upload APT repository artifact
        uses: actions/upload-artifact@v7
        with:
          name: wardian-apt-repository-${{ inputs.release_tag }}
          path: |
            ${{ steps.prepare_repository.outputs.repo_out }}
            !${{ steps.prepare_repository.outputs.repo_out }}/.git/**

      - name: Publish APT repository
        if: steps.publish_mode.outputs.effective_publish == 'true'
        run: |
          set -euo pipefail
          cd "$APT_REPO_OUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "APT repository is already up to date."
          else
            git commit -m "chore(apt): publish ${RELEASE_TAG}"
            git push origin "HEAD:${APT_REPOSITORY_BRANCH}"
          fi
