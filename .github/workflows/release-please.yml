name: Release Please

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          fetch-depth: 0
      - name: Sync release PR Cargo lockfile
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PLEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          release_branch="$(
            node -e 'const prs = JSON.parse(process.env.RELEASE_PLEASE_PRS || "[]"); console.log(prs[0]?.headBranchName ?? "");'
          )"

          if [ -z "$release_branch" ] || [ "$release_branch" = "null" ]; then
            echo "No pending Release Please PR branch found."
            exit 1
          fi

          git fetch origin "$release_branch"
          git checkout -B "$release_branch" "origin/$release_branch"
          cargo update --workspace

          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already matches release manifests."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync release Cargo.lock"
          git push origin "HEAD:$release_branch"
      - name: Dispatch asset build
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f dry_run=false \
            -f tag="$RELEASE_TAG" \
            -f release_tag="$RELEASE_TAG"
