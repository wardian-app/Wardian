name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref to build for manual runs (tag, branch, or SHA)"
        required: false
        default: ""
      release_tag:
        description: "Existing GitHub release tag to upload assets to when dry_run=false"
        required: false
        default: ""
      dry_run:
        description: "Dry run (build artifacts, do not create a release)"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      is_prerelease: ${{ steps.detect.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect prerelease
        id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-preview.* || "$TAG" == *-beta.* || "$TAG" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release notes for $VERSION not found in CHANGELOG.md" >&2
            echo "See CHANGELOG.md" > release_notes.md
          fi
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_notes.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');
            const res = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Wardian ${tag}`,
              body,
              draft: true,
              prerelease: ${{ steps.detect.outputs.prerelease }},
            });
            return res.data.id;
          result-encoding: string

  resolve-release:
    name: Resolve existing release
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.lookup.outputs.release_id }}
    steps:
      - name: Resolve existing release
        id: lookup
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        with:
          script: |
            const releaseTag = process.env.RELEASE_TAG;
            if (!releaseTag) {
              core.setFailed('release_tag is required when dry_run=false');
              return;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((candidate) => candidate.tag_name === releaseTag);
            if (!release) {
              core.setFailed(`Release ${releaseTag} was not found`);
              return;
            }

            core.setOutput('release_id', String(release.id));

  build:
    name: Build (${{ matrix.platform.os }}${{ matrix.platform.arch && format(' / {0}', matrix.platform.arch) || '' }})
    needs: [create-release, resolve-release]
    if: always() && (needs.create-release.result == 'success' || needs.resolve-release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'))
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-latest
            name: windows
          - os: macos-latest
            arch: aarch64
            name: macos-arm64
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            name: macos-x64
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - os: ubuntu-22.04
            name: linux
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload (tag push)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.args || '' }}

      - name: Build and upload (manual backfill)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.resolve-release.outputs.release_id }}
          args: ${{ matrix.platform.args || '' }}

      - name: Build (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.platform.args || '' }}

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wardian-${{ matrix.platform.name }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.deb
          if-no-files-found: warn

  publish:
    name: Publish release
    needs: [create-release, resolve-release, build]
    if: always() && needs.build.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'))
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ github.event_name == 'push' && needs.create-release.outputs.release_id || needs.resolve-release.outputs.release_id }},
              draft: false,
            });
