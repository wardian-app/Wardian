name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref to build for manual runs (tag, branch, or SHA)"
        required: false
        default: ""
      release_tag:
        description: "Existing GitHub release tag to upload assets to when dry_run=false"
        required: false
        default: ""
      dry_run:
        description: "Dry run (build artifacts, do not create a release)"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      is_prerelease: ${{ steps.detect.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect prerelease
        id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release notes for $VERSION not found in CHANGELOG.md" >&2
            echo "See CHANGELOG.md" > release_notes.md
          fi
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_notes.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');
            const res = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Wardian ${tag}`,
              body,
              draft: true,
              prerelease: ${{ steps.detect.outputs.prerelease }},
            });
            return res.data.id;
          result-encoding: string

  resolve-release:
    name: Resolve existing release
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.lookup.outputs.release_id }}
      is_prerelease: ${{ steps.lookup.outputs.prerelease }}
    steps:
      - name: Resolve existing release
        id: lookup
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        with:
          script: |
            const releaseTag = process.env.RELEASE_TAG;
            if (!releaseTag) {
              core.setFailed('release_tag is required when dry_run=false');
              return;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((candidate) => candidate.tag_name === releaseTag);
            if (!release) {
              core.setFailed(`Release ${releaseTag} was not found`);
              return;
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('prerelease', String(release.prerelease || releaseTag.includes('-')));

      - name: Ensure manual release is draft
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.lookup.outputs.release_id }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });
            if (!release.draft) {
              core.setFailed('manual backfill requires a draft release');
            }

  build:
    name: Build (${{ matrix.platform.os }}${{ matrix.platform.arch && format(' / {0}', matrix.platform.arch) || '' }})
    needs: [create-release, resolve-release]
    if: always() && (needs.create-release.result == 'success' || needs.resolve-release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'))
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-latest
            name: windows
          - os: macos-latest
            arch: aarch64
            name: macos-arm64
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            name: macos-x64
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - os: ubuntu-22.04
            name: linux
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true' && inputs.release_tag || github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/wardian-core
            crates/wardian-cli

      - name: Install Linux deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload (tag push)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WARDIAN_CLI_TARGET: ${{ matrix.platform.rust-target || '' }}
          WARDIAN_UPDATE_CHANNEL: ${{ needs.create-release.outputs.is_prerelease == 'false' && 'stable' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: ${{ needs.create-release.outputs.is_prerelease == 'false' }}
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.platform.args || '' }}

      - name: Build and upload (manual backfill)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WARDIAN_CLI_TARGET: ${{ matrix.platform.rust-target || '' }}
          WARDIAN_UPDATE_CHANNEL: ${{ needs.resolve-release.outputs.is_prerelease == 'false' && 'stable' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.resolve-release.outputs.release_id }}
          tagName: ${{ inputs.release_tag }}
          releaseDraft: true
          includeUpdaterJson: ${{ needs.resolve-release.outputs.is_prerelease == 'false' }}
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.platform.args || '' }}

      - name: Build (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          WARDIAN_CLI_TARGET: ${{ matrix.platform.rust-target || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --config src-tauri/tauri.updater.conf.json ${{ matrix.platform.args || '' }}

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: wardian-${{ matrix.platform.name }}
          path: |
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/*/release/bundle/**/*.exe
            target/*/release/bundle/**/*.dmg
            target/*/release/bundle/**/*.AppImage
            target/*/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.deb
          if-no-files-found: warn

  cleanup-updater-signatures:
    name: Remove loose updater signature assets
    needs: [create-release, resolve-release, build]
    if: always() && needs.build.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true'))
    runs-on: ubuntu-latest
    steps:
      - name: Remove loose updater signature assets
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number('${{ github.event_name == 'push' && needs.create-release.outputs.release_id || needs.resolve-release.outputs.release_id }}');
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });
            const signatureAssets = assets.filter((asset) => asset.name.endsWith('.sig'));
            for (const asset of signatureAssets) {
              core.info(`Deleting loose updater signature asset ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            core.info(`Deleted ${signatureAssets.length} loose updater signature asset(s)`);

  validate-updater-metadata:
    name: Validate updater metadata
    needs: [create-release, resolve-release, build, cleanup-updater-signatures]
    if: always() && needs.build.result == 'success' && needs.cleanup-updater-signatures.result == 'success' && ((github.event_name == 'push' && needs.create-release.outputs.is_prerelease == 'false') || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true' && needs.resolve-release.outputs.is_prerelease == 'false'))
    runs-on: ubuntu-latest
    steps:
      - name: Validate updater metadata
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number('${{ github.event_name == 'push' && needs.create-release.outputs.release_id || needs.resolve-release.outputs.release_id }}');
            const expectedTag = '${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}';
            const expectedVersion = expectedTag.replace(/^v/, '');
            const requiredPlatforms = [
              'windows-x86_64',
              'linux-x86_64',
              'darwin-aarch64',
              'darwin-x86_64',
            ];

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });
            const latestJson = assets.find((asset) => asset.name === 'latest.json');
            if (!latestJson) {
              core.setFailed('latest.json was not uploaded to the release');
              return;
            }

            const response = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: latestJson.id,
              headers: { accept: 'application/octet-stream' },
            });
            const raw = Buffer.from(response.data).toString('utf8');
            const metadata = JSON.parse(raw);
            if (metadata.version !== expectedVersion) {
              core.setFailed(`latest.json version ${metadata.version ?? '<missing>'} does not match ${expectedVersion}`);
              return;
            }

            const releaseAssetNames = new Set(assets.map((asset) => asset.name));
            const releaseAssetNameFromUrl = (candidateUrl) => {
              let parsed;
              try {
                parsed = new URL(candidateUrl);
              } catch {
                return null;
              }

              const parts = parsed.pathname.split('/').filter(Boolean).map((part) => decodeURIComponent(part));
              const [owner, repo, releases, download, tag, ...assetParts] = parts;
              if (
                parsed.protocol !== 'https:' ||
                parsed.hostname !== 'github.com' ||
                owner !== context.repo.owner ||
                repo !== context.repo.repo ||
                releases !== 'releases' ||
                download !== 'download' ||
                tag !== expectedTag ||
                assetParts.length === 0
              ) {
                return null;
              }

              return assetParts.join('/');
            };

            const platforms = metadata.platforms ?? {};
            const missing = requiredPlatforms.filter((platform) => {
              const entry = platforms[platform];
              return !entry || !entry.url || !entry.signature;
            });
            if (missing.length > 0) {
              core.setFailed(`latest.json missing updater metadata for: ${missing.join(', ')}`);
              return;
            }

            const invalidUrls = requiredPlatforms.filter((platform) => {
              const assetName = releaseAssetNameFromUrl(platforms[platform].url);
              return !assetName || !releaseAssetNames.has(assetName);
            });
            if (invalidUrls.length > 0) {
              core.setFailed(`latest.json contains URLs that do not target uploaded ${expectedTag} assets: ${invalidUrls.join(', ')}`);
            }

  publish:
    name: Publish release
    needs: [create-release, resolve-release, build, cleanup-updater-signatures, validate-updater-metadata]
    if: always() && needs.build.result == 'success' && needs.cleanup-updater-signatures.result == 'success' && ((github.event_name == 'push' && ((needs.create-release.outputs.is_prerelease == 'false' && needs.validate-updater-metadata.result == 'success') || needs.create-release.outputs.is_prerelease == 'true')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true' && ((needs.resolve-release.outputs.is_prerelease == 'false' && needs.validate-updater-metadata.result == 'success') || needs.resolve-release.outputs.is_prerelease == 'true')))
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ github.event_name == 'push' && needs.create-release.outputs.release_id || needs.resolve-release.outputs.release_id }},
              draft: false,
            });

  dispatch-package-workflows:
    name: Dispatch package workflows
    needs: [create-release, resolve-release, publish]
    if: always() && needs.publish.result == 'success' && ((github.event_name == 'push' && needs.create-release.outputs.is_prerelease == 'false') || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true' && needs.resolve-release.outputs.is_prerelease == 'false'))
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      RELEASE_DISPATCH_APP_ID: ${{ vars.WARDIAN_RELEASE_DISPATCH_APP_ID }}
      RELEASE_DISPATCH_PRIVATE_KEY: ${{ secrets.WARDIAN_RELEASE_DISPATCH_PRIVATE_KEY }}
    steps:
      - name: Skip package dispatch when GitHub App is unavailable
        if: env.RELEASE_DISPATCH_APP_ID == '' || env.RELEASE_DISPATCH_PRIVATE_KEY == ''
        run: |
          echo "::notice::WARDIAN_RELEASE_DISPATCH_APP_ID or WARDIAN_RELEASE_DISPATCH_PRIVATE_KEY is not configured; skipping package workflow dispatch."

      - name: Create package dispatch token
        id: app-token
        if: env.RELEASE_DISPATCH_APP_ID != '' && env.RELEASE_DISPATCH_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ vars.WARDIAN_RELEASE_DISPATCH_APP_ID }}
          private-key: ${{ secrets.WARDIAN_RELEASE_DISPATCH_PRIVATE_KEY }}
          owner: wardian-app
          repositories: |
            homebrew-tap
            packages
          permission-actions: write

      - name: Dispatch tap cask update
        if: steps.app-token.outputs.token != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'wardian-app',
              repo: 'homebrew-tap',
              workflow_id: 'update-cask.yml',
              ref: 'main',
              inputs: {
                tag: process.env.RELEASE_TAG,
              },
            });

      - name: Dispatch APT repository update
        if: steps.app-token.outputs.token != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'wardian-app',
              repo: 'packages',
              workflow_id: 'publish-apt.yml',
              ref: 'main',
              inputs: {
                release_tag: process.env.RELEASE_TAG,
              },
            });
