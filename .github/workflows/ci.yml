name: Wardian CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit
          cargo audit
      - name: NPM Audit
        run: npm audit --audit-level=high

  frontend-quality:
    name: Frontend (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Lint (TypeScript)
        run: npm run lint
      - name: Unit Tests
        if: github.event_name == 'pull_request'
        run: npm run test
      - name: Coverage Report
        if: github.event_name == 'pull_request'
        run: npm run test:coverage
      - name: Upload Frontend Coverage
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-windows:
    name: Backend (Windows - Full Test)
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: Test
        working-directory: src-tauri
        run: cargo test
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Coverage Report
        run: npm run test:coverage:rust
      - name: Upload Backend Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/rust-lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-smoke:
    name: E2E Smoke Tests (Windows)
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          WARDIAN_HOME: ${{ runner.temp }}\wardian-e2e-test
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/test-results/

  pr-screenshots:
    name: PR Screenshots (Windows)
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Capture screenshots
        run: npm run screenshots
        env:
          WARDIAN_HOME: ${{ runner.temp }}\wardian-screenshots-test
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: e2e/screenshots/

  backend-linux-check:
    name: Backend (Linux - Compile Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
              sudo apt-get install -y build-essential curl wget file
              # GTK and glib
              sudo apt-get install -y libglib2.0-dev pkg-config
              sudo apt-get install -y libgtk-3-dev libgdk-pixbuf2.0-dev
              # Webkit2GTK (for webview - required by Tauri)
              sudo apt-get install -y libwebkit2gtk-4.1-dev
              # Additional GTK dependencies
              sudo apt-get install -y libsoup-3.0-dev
              sudo apt-get install -y libjavascriptcoregtk-4.1-dev
              # X11 and window manager libraries
              sudo apt-get install -y libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
              # Additional required libraries
              sudo apt-get install -y libssl-dev libxkbcommon-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Check Compilation
        working-directory: src-tauri
        run: cargo check
