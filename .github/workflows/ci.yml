name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Rust Audit
        run: |
          # RUSTSEC-2026-0194 and RUSTSEC-2026-0195 require quick-xml >=0.41.0.
          # Current transitive users are pinned below that range:
          # - tauri-winrt-notification 0.7.2 -> quick-xml ^0.37
          # - plist 1.9.0 -> quick-xml ^0.39.2
          cargo audit \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195
      - name: NPM Audit
        run: npm audit --audit-level=high

  frontend-quality:
    name: Frontend (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Require frontend screenshot evidence
        if: github.event_name == 'pull_request'
        run: npm run check:frontend-screenshot -- origin/${{ github.base_ref }} HEAD
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
      - name: Lint (TypeScript)
        run: npm run lint
      - name: Unit Tests
        run: npm run test
      - name: Coverage Report
        run: npm run test:coverage
      - name: Upload Frontend Coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-windows:
    name: Backend (Windows - Lint, Test & Check)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace -- --test-threads=1
      - name: Check Compilation
        run: cargo check --workspace

  e2e-smoke:
    name: E2E Smoke Tests (Windows)
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          WARDIAN_HOME: ${{ runner.temp }}\wardian-e2e-test
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: e2e/test-results/

  backend-linux-coverage:
    name: Backend (Linux - Test & Coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl wget file pkg-config \
            libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libssl-dev libxkbcommon-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Test with Coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --lcov --output-path coverage/rust-lcov.info
      - name: Upload Backend Coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/rust-lcov.info
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
