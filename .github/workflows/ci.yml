name: Wardian CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit
          cargo audit
      - name: NPM Audit
        run: npm audit --audit-level=high

  frontend-quality:
    name: Frontend (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Lint (TypeScript)
        run: npm run lint
      - name: Unit Tests
        run: npm run test

  backend-windows:
    name: Backend (Windows - Full Test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: Test
        working-directory: src-tauri
        run: cargo test

  backend-linux-check:
    name: Backend (Linux - Compile Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev pkg-config
          sudo apt-get install -y libgtk-3-dev libgdk-pixbuf2.0-dev
          sudo apt-get install -y libsoup-3.0-dev
          sudo apt-get install -y libjavascriptcoregtk-4.1-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Check Compilation
        working-directory: src-tauri
        run: cargo check
